DATASET:
  NAME: 'voc'
  NUM_CLASSES: 20
  DATAROOT: 'data/VOCdevkit/VOC2012/'
  SCALE: [2048, 336]
  RATIO_RANGE: [0.5, 2.0]
  CROP_SIZE: [336, 336]
  CAT_MAX_RATIO: 0.75
  IMG_NORM_CFG:
    MEAN: [122.771, 116.746, 104.094]
    STD: [68.501, 66.632, 70.323]
    RGB: True
  TEXT_WEIGHT: 'text/voc_ViT16_clip_text.pth'
  K: 2
  THRESHOLD: 23
  REDUCE_ZERO_LABEL: TRUE
  IGNORE_INDEX: 255

MODEL:
  FEATURE_EXTRACTOR: 'vit'
  TEXT_CHANNEL: 512
  VISUAL_CHANNEL: 768
  TRAINING: True
  FEATURE_FUSION:
    ENABLE: True
    LAYERS: [6, 9, 12]
    MODE: 'l9_l12'
    GAMMA9: 0.20
    GAMMA6: 0.05
    GATE_TEMP: 10.0
    INIT_GAMMA: 0.0
    PRESERVE_LOSS_WEIGHT: 0.0
  CLASS_GATE:
    ENABLE: False
    THRESHOLD: 0.20
    TEMP: 10.0
    LOG_BIAS_SCALE: 1.0

TRAIN:
  BATCH_SIZE: 1
  MAX_EPOCH: 200
  EPOCH: 50
  LR: 0.01

TEST:
  BATCH_SIZE: 1

EVAL_METRIC: "miou"
SAVE_DIR: "experiments/voc_l9l12_selective_v2/"
NUM_WORKERS: 4
