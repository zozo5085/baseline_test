DATASET:
  NAME: 'context'
  NUM_CLASSES: 59
  DATAROOT: 'D:/ReCLIPv3/datasets/PASCAL VOC/VOC2010/'
  SCALE: [2048, 448]
  RATIO_RANGE: [0.5, 2.0]
  CROP_SIZE: [480, 480]
  CAT_MAX_RATIO: 0.75
  IMG_NORM_CFG:
    MEAN: [122.771, 116.746, 104.094]
    STD: [68.501, 66.632, 70.323]
    RGB: True
  TEXT_WEIGHT: 'text/context_ViT16_clip_text.pth'
  REDUCE_ZERO_LABEL: TRUE
  IGNORE_INDEX: 255

MODEL:
  FEATURE_EXTRACTOR: 'vit'
  TEXT_CHANNEL: 512
  VISUAL_CHANNEL: 768
  TRAINING: False
  SFP_DTLR:
    # --- dataset-agnostic (de-VOC'd per JOURNAL_EXTENSION_PLAN checklist) ---
    TOP_FRACTION: 0.75
    DTLR_SIGMA_S_REL: 2.3
    DTLR_BETA: 1.0
    PROXY_LAMBDA: 1.0
    DTLR_STRUCTURE_CLASSES: []
    # --- entropy-normalized reliability gate (code de-VOC fix 2026-07-08) ---
    # Removes the class-count confound of CONF_THD/PROXY_CONF_THD: on 59-class Context the
    # max-softmax is mechanically lower, so the fixed 0.97/0.95 cutoffs over-flagged tokens.
    # H_norm = entropy(softmax(logits*CONF_SCALE))/log(C) is class-count-invariant; the two
    # taus below are frozen from the VOC C=20 operating point and applied UNCHANGED here
    # (no Context-val tuning). CONF_SCALE still used as the softmax temperature.
    ENTROPY_GATE: true
    ENTROPY_TAU_UNREL: 0.0745
    ENTROPY_TAU_REL: 0.1154
    CONF_SCALE: 10.0
    # CONF_THD / PROXY_CONF_THD are bypassed when ENTROPY_GATE is on (kept for reference):
    CONF_THD: 0.97
    PROXY_CONF_THD: 0.95
    PROXY_KERNEL: 5

TEST:
  BATCH_SIZE: 1
  PD: 0.85
  ReCLIP_PD: 0.6

EVAL_METRIC: "miou"
SAVE_DIR: "experiments/context_sfp_entgate_eval/"
LOAD_PATH: "experiments/context_vanilla_run2/best_weight.pth"
NUM_WORKERS: 4
