DATASET:
  NAME: 'ade'
  NUM_CLASSES: 150
  DATAROOT: 'D:/ReCLIPv3/datasets/ADEChallengeData2016/'
  SCALE: [2048, 512]
  RATIO_RANGE: [0.5, 2.0]
  CROP_SIZE: [512, 512]
  CAT_MAX_RATIO: 0.75
  IMG_NORM_CFG:
    MEAN: [122.771, 116.746, 104.094]
    STD: [68.501, 66.632, 70.323]
    RGB: True
  TEXT_WEIGHT: 'text/ade_ViT16_clip_text.pth'
  REDUCE_ZERO_LABEL: TRUE
  IGNORE_INDEX: 255

MODEL:
  FEATURE_EXTRACTOR: 'vit'
  TEXT_CHANNEL: 512
  VISUAL_CHANNEL: 768
  TRAINING: False
  SFP_DTLR:
    # --- dataset-agnostic profile, frozen per GENERALIZATION_PROTOCOL.md section 2 / 8.2 ---
    TOP_FRACTION: 0.75
    DTLR_SIGMA_S_REL: 2.3
    DTLR_BETA: 1.0
    PROXY_LAMBDA: 1.0
    DTLR_STRUCTURE_CLASSES: []
    # --- entropy-normalized reliability gate; taus frozen from VOC C=20, no ADE tuning ---
    ENTROPY_GATE: true
    ENTROPY_TAU_UNREL: 0.0745
    ENTROPY_TAU_REL: 0.1154
    CONF_SCALE: 10.0
    # bypassed when ENTROPY_GATE on (reference):
    CONF_THD: 0.97
    PROXY_CONF_THD: 0.95
    PROXY_KERNEL: 5

TEST:
  BATCH_SIZE: 1
  PD: 0.85
  ReCLIP_PD: 0.6

EVAL_METRIC: "miou"
SAVE_DIR: "experiments/ade_conv_eval/entgate_notta/"
LOAD_PATH: "experiments/ade_vanilla_converged/best_weight.pth"
NUM_WORKERS: 4
