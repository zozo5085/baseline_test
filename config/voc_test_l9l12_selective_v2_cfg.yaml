DATASET:
  NAME: 'voc'
  NUM_CLASSES: 20
  DATAROOT: 'data/VOCdevkit/VOC2012/'
  SCALE: [2048, 336]
  RATIO_RANGE: [0.5, 2.0]
  CROP_SIZE: [512, 512]
  CAT_MAX_RATIO: 0.75
  IMG_NORM_CFG:
    MEAN: [122.771, 116.746, 104.094]
    STD: [68.501, 66.632, 70.323]
    RGB: True
  TEXT_WEIGHT: 'text/voc_ViT16_clip_text.pth'
  REDUCE_ZERO_LABEL: TRUE
  PALETTE: [[128, 0, 0], [0, 128, 0], [128, 128, 0], [0, 0, 128],
            [128, 0, 128], [0, 128, 128], [128, 128, 128], [64, 0, 0],
            [192, 0, 0], [64, 128, 0], [192, 128, 0], [64, 0, 128],
            [192, 0, 128], [64, 128, 128], [192, 128, 128], [0, 64, 0],
            [128, 64, 0], [0, 192, 0], [128, 192, 0], [0, 64, 128]]

MODEL:
  FEATURE_EXTRACTOR: 'vit'
  TEXT_CHANNEL: 512
  VISUAL_CHANNEL: 768
  TRAINING: False
  FEATURE_FUSION:
    ENABLE: True
    LAYERS: [6, 9, 12]
    MODE: 'l9_l12'
    GAMMA9: 0.20
    GAMMA6: 0.05
    GATE_TEMP: 10.0
    INIT_GAMMA: 0.0
    PRESERVE_LOSS_WEIGHT: 0.0
  CLASS_GATE:
    ENABLE: False
    THRESHOLD: 0.20
    TEMP: 10.0
    LOG_BIAS_SCALE: 1.0

TEST:
  BATCH_SIZE: 1
  PD: 1.0

EVAL_METRIC: "miou"
SAVE_DIR: "experiments/voc_l9l12_selective_v2/"
LOAD_PATH: "experiments/voc_l9l12_selective_v2/best_weight.pth"
NUM_WORKERS: 4
