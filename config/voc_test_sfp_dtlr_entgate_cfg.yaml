DATASET:
  NAME: 'voc'
  NUM_CLASSES: 20
  DATAROOT: 'data/VOCdevkit/VOC2012/'
  SCALE: [2048, 336]
  RATIO_RANGE: [0.5, 2.0]
  CROP_SIZE: [512, 512]
  CAT_MAX_RATIO: 0.75
  IMG_NORM_CFG:
    MEAN: [122.771, 116.746, 104.094]
    STD: [68.501, 66.632, 70.323]
    RGB: True
  TEXT_WEIGHT: 'text/voc_ViT16_clip_text.pth'
  REDUCE_ZERO_LABEL: TRUE
  PALETTE: [[128, 0, 0], [0, 128, 0], [128, 128, 0], [0, 0, 128],
            [128, 0, 128], [0, 128, 128], [128, 128, 128], [64, 0, 0],
            [192, 0, 0], [64, 128, 0], [192, 128, 0], [64, 0, 128],
            [192, 0, 128], [64, 128, 128], [192, 128, 128], [0, 64, 0],
            [128, 64, 0], [0, 192, 0], [128, 192, 0], [0, 64, 128]]

MODEL:
  FEATURE_EXTRACTOR: 'vit'
  TEXT_CHANNEL: 512
  VISUAL_CHANNEL: 768
  TRAINING: False
  SFP_DTLR:
    TOP_FRACTION: 0.75
    DTLR_SIGMA_S_REL: 2.3
    DTLR_BETA: 1.0
    PROXY_LAMBDA: 1.0
    DTLR_STRUCTURE_CLASSES: []
    # Dataset-agnostic entropy-normalized reliability gate (code de-VOC fix 2026-07-08).
    # Replaces absolute max-prob CONF_THD/PROXY_CONF_THD (class-count dependent) with
    # H_norm = entropy(softmax(logits*CONF_SCALE))/log(C) in [0,1]. Taus are the
    # normalized-entropy equivalents of the VOC max-prob thresholds at C=20, then FROZEN
    # and applied unchanged to every dataset. This VOC run is the requirement-4 regression
    # check: gate must not drop VOC materially vs the 0.8582 non-gated gen result.
    ENTROPY_GATE: true
    ENTROPY_TAU_UNREL: 0.0745
    ENTROPY_TAU_REL: 0.1154

TEST:
  BATCH_SIZE: 1
  PD: 1.0

EVAL_METRIC: "miou"
SAVE_DIR: "experiments/voc_sfp_entgate_eval/"
LOAD_PATH: "experiments/official/voc_reclippp_854/best_weight.pth"
NUM_WORKERS: 4
