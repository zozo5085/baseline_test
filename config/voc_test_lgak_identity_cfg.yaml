DATASET:
  NAME: 'voc'
  NUM_CLASSES: 20
  DATAROOT: 'data/VOCdevkit/VOC2012/'
  SCALE: [2048, 336]
  RATIO_RANGE: [0.5, 2.0]
  CROP_SIZE: [512, 512]
  CAT_MAX_RATIO: 0.75
  IMG_NORM_CFG:
    MEAN: [122.771, 116.746, 104.094]
    STD: [68.501, 66.632, 70.323]
    RGB: True
  TEXT_WEIGHT: 'text/voc_ViT16_clip_text.pth'
  REDUCE_ZERO_LABEL: TRUE

MODEL:
  FEATURE_EXTRACTOR: 'vit'
  TEXT_CHANNEL: 512
  VISUAL_CHANNEL: 768
  TRAINING: False
  LGAK:
    # Identity check: alpha frozen at 0 -> model.model_lgak MUST reproduce baseline 0.8536.
    # INIT_FROM empty; tools/test_tta.py loads LOAD_PATH (strict=False for non-model.model),
    # populating the baseline and leaving the fresh LGAK at alpha=0.
    INIT_FROM: ""
    ALPHA_TRAINABLE: false
    KERNEL: 3
    HIDDEN: 128

TEST:
  BATCH_SIZE: 1
  PD: 1.0

EVAL_METRIC: "miou"
SAVE_DIR: "experiments/voc_lgak_identity/"
LOAD_PATH: "experiments/official/voc_reclippp_854/best_weight.pth"
NUM_WORKERS: 4
